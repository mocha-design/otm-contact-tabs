<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ニュース詳細</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--navy:#0D1B2A;--navy-mid:#1B2D45;--steel:#415A77;--gold:#C8A960;--gold-light:#D4BA7A;--warm-white:#FAF8F5;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background-color:var(--warm-white);font-family:'Noto Sans JP',sans-serif;color:var(--navy);}
  .article-header{background-color:var(--navy);padding:60px 40px;}
  .article-header-inner{max-width:900px;margin:0 auto;}
  .header-meta{display:flex;align-items:center;gap:16px;margin-bottom:20px;}
  .article-category{display:inline-block;font-size:11px;font-weight:700;padding:4px 14px;border-radius:20px;letter-spacing:.06em;}
  .article-category.cat-info{background-color:var(--gold);color:var(--navy);}
  .article-category.cat-land{background-color:#fff;color:var(--navy);}
  .article-category.cat-default{background-color:var(--steel);color:#fff;}
  .article-date{font-family:'Inter',sans-serif;font-size:13px;color:rgba(255,255,255,.6);letter-spacing:.04em;}
  .article-title{font-family:'Noto Serif JP',serif;font-size:32px;font-weight:600;line-height:1.5;color:#fff;}
  .article-body-wrap{background-color:var(--warm-white);padding:60px 40px;}
  .article-body-inner{max-width:900px;margin:0 auto;}
  .article-body p{font-size:15px;line-height:1.9;color:var(--navy);margin-bottom:1.4em;}
  .article-body p:last-child{margin-bottom:0;}
  .article-footer{max-width:900px;margin:0 auto;padding:20px 40px 60px;}
  .back-link{display:inline-flex;align-items:center;gap:8px;font-size:14px;color:var(--steel);text-decoration:none;padding:10px 0;transition:color .2s;border-bottom:1px solid transparent;}
  .back-link:hover{color:var(--gold);}
  .back-link::before{content:'←';font-size:16px;}
  .loading{text-align:center;padding:80px 20px;color:var(--steel);font-size:14px;}
  @media(max-width:640px){
    .article-header{padding:48px 20px;}
    .article-title{font-size:24px;}
    .article-body-wrap{padding:40px 20px;}
    .article-footer{padding:16px 20px 48px;}
  }
</style>
</head>
<body>
<div id="app"><div class="loading">読み込み中...</div></div>
<script>
  const DATA_URL='https://cdn.jsdelivr.net/gh/mocha-design/otm-contact-tabs@main/data/news_data.json';
  const SITE_URL='https://tan669662.studio.site';
  function formatDate(d){return d?d.replace(/-/g,'.'):''}
  function getCategoryClass(c){
    if(!c) return 'cat-default';
    if(c.includes('お知らせ')) return 'cat-info';
    if(c.includes('土地')) return 'cat-land';
    return 'cat-default';
  }
  function getSlugFromReferrer(){
    try{
      const ref=document.referrer||'';
      let m=ref.match(/\/news-detail\/([^/?#]+)/);
      if(m) return decodeURIComponent(m[1]);
      m=ref.match(/[?&]slug=([^&#]+)/);
      if(m) return decodeURIComponent(m[1]);
    }catch(e){}
    return null;
  }
  function bodyToHtml(body){
    if(!body) return '';
    return body.split(/\n+/).filter(p=>p.trim()).map(p=>`<p>${p.trim()}</p>`).join('');
  }
  function renderArticle(item){
    const catClass=getCategoryClass(item.category||'');
    document.getElementById('app').innerHTML=`
      <div class="article-header"><div class="article-header-inner">
        <div class="header-meta">
          <span class="article-category ${catClass}">${item.category||''}</span>
          <span class="article-date">${formatDate(item.date||'')}</span>
        </div>
        <h1 class="article-title">${item.title||''}</h1>
      </div></div>
      <div class="article-body-wrap"><div class="article-body-inner">
        <div class="article-body">${bodyToHtml(item.body||item.content||'')}</div>
      </div></div>
      <div class="article-footer">
        <a class="back-link" href="${SITE_URL}/news" target="_top">ニュース一覧に戻る</a>
      </div>`;
    if(item.title) document.title=item.title+' | ニュース';
  }
  fetch(DATA_URL).then(r=>r.json()).then(data=>{
    const items=(data.items||[]).filter(it=>it.published!==false);
    if(!items.length){document.getElementById('app').innerHTML='<div class="loading">記事が見つかりませんでした</div>';return;}
    const slug=getSlugFromReferrer();
    const found=(slug&&items.find(it=>it.slug===slug))||items[0];
    renderArticle(found);
  }).catch(()=>{
    document.getElementById('app').innerHTML='<div class="loading">データの読み込みに失敗しました</div>';
  });
</script>
</body>
</html>
