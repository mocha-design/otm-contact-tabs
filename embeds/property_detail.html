<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>物件詳細</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0D1B2A;--navy-mid:#1B2D45;--steel:#415A77;--gold:#C8A960;--gold-light:#D4BA7A;--warm-white:#FAF8F5;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--warm-white);color:var(--navy);min-height:100vh}
.wrap{max-width:1060px;margin:0 auto;padding:32px 20px 60px}
.layout{display:grid;grid-template-columns:1fr 320px;gap:32px;align-items:start}
@media(max-width:768px){.layout{grid-template-columns:1fr;gap:24px}}
.hero{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 60%,var(--steel) 100%);border-radius:10px;padding:36px 32px;margin-bottom:28px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:220px;height:220px;border-radius:50%;background:rgba(200,169,96,.12);pointer-events:none}
.hero-cat{display:inline-block;background:var(--gold);color:white;font-size:.72rem;font-weight:700;letter-spacing:.08em;padding:4px 12px;border-radius:4px;margin-bottom:10px;font-family:'Inter',sans-serif}
.hero-num{font-family:'Inter',sans-serif;font-size:.78rem;color:rgba(255,255,255,.55);margin-bottom:8px;}
.hero-title{font-family:'Noto Serif JP',serif;font-size:1.45rem;font-weight:700;color:white;line-height:1.5;margin-bottom:16px}
.hero-price{font-family:'Inter',sans-serif;font-size:1.8rem;font-weight:700;color:var(--gold-light);}
.hero-price small{font-size:.85rem;font-weight:400;margin-left:4px;color:rgba(255,255,255,.55);}
.section{background:white;border-radius:10px;padding:24px;margin-bottom:22px;box-shadow:0 2px 10px rgba(13,27,42,.06)}
.section-title{font-family:'Noto Serif JP',serif;font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid var(--gold);}
.prop-table{width:100%;border-collapse:collapse;font-size:.875rem}
.prop-table tr{border-bottom:1px solid #edf0f3}
.prop-table tr:last-child{border-bottom:none}
.prop-table th{width:130px;padding:11px 14px 11px 0;font-weight:600;color:var(--steel);text-align:left;vertical-align:top;white-space:nowrap;font-size:.82rem;}
.prop-table td{padding:11px 0;color:var(--navy);line-height:1.6}
.features{list-style:none;display:flex;flex-direction:column;gap:10px}
.features li{display:flex;align-items:flex-start;gap:10px;font-size:.875rem;line-height:1.6}
.features li::before{content:'✓';flex-shrink:0;width:20px;height:20px;background:var(--gold);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;margin-top:2px}
.sidebar{display:flex;flex-direction:column;gap:20px}
.contact-box{background:var(--navy);border-radius:10px;padding:24px;color:white}
.contact-box-title{font-family:'Noto Serif JP',serif;font-size:1rem;font-weight:600;color:var(--gold-light);margin-bottom:6px}
.contact-box-sub{font-size:.78rem;color:rgba(255,255,255,.6);margin-bottom:20px;line-height:1.6}
.contact-btn{display:block;width:100%;background:var(--gold);color:white;text-align:center;font-weight:700;font-size:.9rem;padding:13px;border-radius:7px;cursor:pointer;border:none;font-family:'Noto Sans JP',sans-serif;margin-bottom:14px;transition:background .18s}
.contact-btn:hover{background:var(--gold-light)}
.tel-box{border-top:1px solid rgba(255,255,255,.12);padding-top:14px;text-align:center}
.tel-label{font-size:.7rem;color:rgba(255,255,255,.5);margin-bottom:4px}
.tel-num{font-family:'Inter',sans-serif;font-size:1.3rem;font-weight:700;color:white;}
.tel-hours{font-size:.7rem;color:rgba(255,255,255,.45);margin-top:3px}
.related-box{background:white;border-radius:10px;padding:20px;box-shadow:0 2px 10px rgba(13,27,42,.06)}
.related-title{font-size:.82rem;font-weight:700;color:var(--steel);letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px;border-bottom:1px solid #edf0f3;padding-bottom:10px}
.related-list{display:flex;flex-direction:column;gap:12px}
.related-item{display:flex;gap:12px;align-items:flex-start;cursor:pointer;padding:8px;border-radius:6px;transition:background .15s}
.related-item:hover{background:var(--warm-white)}
.related-thumb{width:64px;height:52px;flex-shrink:0;border-radius:5px;background:linear-gradient(135deg,var(--navy-mid),var(--steel));overflow:hidden}
.related-thumb img{width:100%;height:100%;object-fit:cover}
.related-cat{font-size:.67rem;font-weight:700;color:var(--gold);margin-bottom:3px}
.related-name{font-size:.8rem;font-weight:600;color:var(--navy);line-height:1.45}
.related-pr{font-size:.72rem;color:var(--steel);margin-top:3px}
.state-msg{text-align:center;padding:80px 20px;color:var(--steel)}
.loader{width:36px;height:36px;border:3px solid #e0e4e8;border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:.82rem;color:var(--steel);cursor:pointer;border:none;background:none;font-family:'Noto Sans JP',sans-serif;padding:0;margin-bottom:20px;}
.back-link:hover{color:var(--navy)}
</style>
</head>
<body>
<div class="wrap">
  <button class="back-link" id="backBtn">← 物件一覧に戻る</button>
  <div id="app"><div class="state-msg"><div class="loader"></div>物件情報を読み込み中...</div></div>
</div>
<script>
const DATA_URL='https://cdn.jsdelivr.net/gh/mocha-design/otm-contact-tabs@main/data/property_data.json';
const SITE='https://tan669662.studio.site';
function nav(url){window.top.location.href=url;}
document.getElementById('backBtn').addEventListener('click',()=>nav(SITE+'/property'));
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getSlugFromReferrer(){
  try{
    const ref=document.referrer||'';
    let m=ref.match(/\/property-detail\/([^/?#]+)/);
    if(m) return decodeURIComponent(m[1]);
    m=ref.match(/[?&]slug=([^&#]+)/);
    if(m) return decodeURIComponent(m[1]);
  }catch(e){}
  return null;
}
function row(label,val){
  if(!val&&val!==0) return '';
  return `<tr><th>${esc(label)}</th><td>${esc(String(val))}</td></tr>`;
}
function renderDetail(item,allItems){
  const num=item.num||'';
  const cat=item.category||'物件';
  const title=item.title||'物件名未設定';
  const price=item.price||'';
  const features=item.features||[];
  const slug=item.slug||'';
  const related=allItems.filter(it=>it.slug!==slug).slice(0,3);
  const relHTML=related.length?related.map(it=>{
    const rs=it.slug||'';
    const rurl=SITE+'/property-detail?slug='+encodeURIComponent(rs);
    return `<div class="related-item" data-href="${esc(rurl)}">
  <div class="related-thumb">${it.image?`<img src="${esc(it.image)}" alt="" loading="lazy">`:''}  </div>
  <div>
    <div class="related-cat">${esc(it.category||'物件')}</div>
    <div class="related-name">${esc(it.title||'')}</div>
    ${it.price?`<div class="related-pr">${esc(String(it.price))}</div>`:''}
  </div>
</div>`;
  }).join(''):'<p style="font-size:.8rem;color:var(--steel)">関連物件はありません</p>';
  const featHTML=features.length?`<ul class="features">${features.map(f=>`<li>${esc(String(f))}</li>`).join('')}</ul>`:'';
  const contactUrl=SITE+'/contact'+(num?'?property='+encodeURIComponent(String(num)):'');
  document.getElementById('app').innerHTML=`
<div class="layout">
  <div>
    ${item.image?`<img style="width:100%;height:260px;object-fit:cover;border-radius:8px;margin-bottom:24px;display:block" src="${esc(item.image)}" alt="${esc(title)}">`:''}
    <div class="hero">
      <div class="hero-cat">${esc(cat)}</div>
      ${num?`<div class="hero-num">物件番号 ${esc(String(num))}</div>`:''}
      <div class="hero-title">${esc(title)}</div>
      ${price?`<div class="hero-price">${esc(String(price))}<small>（税込）</small></div>`:''}
    </div>
    <div class="section">
      <div class="section-title">物件概要</div>
      <table class="prop-table">
        ${row('所在地',item.address)}
        ${row('交通',item.access)}
        ${row('面積',item.area)}
        ${row('用途地域',item.zone)}
        ${row('建ぺい率・容積率',item.coverage)}
        ${row('接道',item.road)}
        ${row('設備',item.facilities)}
        ${row('引渡し',item.delivery)}
        ${row('取引態様',item.transaction)}
      </table>
    </div>
    ${featHTML?`<div class="section"><div class="section-title">物件の特徴</div>${featHTML}</div>`:''}
  </div>
  <div class="sidebar">
    <div class="contact-box">
      <div class="contact-box-title">この物件についてお問い合わせ</div>
      <div class="contact-box-sub">専任担当者が丁寧にご説明いたします。お気軽にご連絡ください。</div>
      <button class="contact-btn" data-href="${esc(contactUrl)}">無料でお問い合わせ</button>
      <div class="tel-box">
        <div class="tel-label">お電話でのお問い合わせ</div>
        <div class="tel-num">0120-000-000</div>
        <div class="tel-hours">平日 9:00～18:00（土日祝除く）</div>
      </div>
    </div>
    <div class="related-box">
      <div class="related-title">関連物件</div>
      <div class="related-list">${relHTML}</div>
    </div>
  </div>
</div>`;
  document.querySelectorAll('.contact-btn[data-href]').forEach(btn=>{
    btn.addEventListener('click',()=>nav(btn.dataset.href));
  });
  document.querySelectorAll('.related-item[data-href]').forEach(el=>{
    el.addEventListener('click',()=>nav(el.dataset.href));
  });
}
fetch(DATA_URL)
  .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
  .then(data=>{
    const items=(data.items||[]).filter(it=>it.published!==false);
    if(!items.length){document.getElementById('app').innerHTML='<div class="state-msg">物件データがありません。</div>';return;}
    const slug=getSlugFromReferrer();
    const item=(slug&&items.find(it=>it.slug===slug))||items[0];
    renderDetail(item,items);
  })
  .catch(err=>{
    document.getElementById('app').innerHTML=`<div class="state-msg">データの取得に失敗しました。<br><small>${esc(err.message)}</small></div>`;
  });
</script>
</body>
</html>
