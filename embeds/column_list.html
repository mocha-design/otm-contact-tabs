<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コラム一覧</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--navy:#0D1B2A;--navy-mid:#1B2D45;--steel:#415A77;--gold:#C8A960;--gold-light:#D4BA7A;--warm-white:#FAF8F5;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background-color:var(--warm-white);font-family:'Noto Sans JP',sans-serif;color:var(--navy);padding:80px 40px;}
  .container{max-width:960px;margin:0 auto;}
  .filter-bar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:48px;}
  .filter-pill{display:inline-block;padding:7px 20px;border-radius:24px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--steel);color:var(--steel);background:transparent;transition:all .2s;user-select:none;}
  .filter-pill:hover{border-color:var(--navy);color:var(--navy);}
  .filter-pill.active{background:var(--navy);border-color:var(--navy);color:#fff;}
  .column-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px;}
  .column-card{background:#fff;border-radius:6px;overflow:hidden;cursor:pointer;box-shadow:0 2px 8px rgba(13,27,42,.06);transition:transform .25s,box-shadow .25s;}
  .column-card:hover{transform:translateY(-5px);box-shadow:0 8px 24px rgba(13,27,42,.12);}
  .card-thumbnail{width:100%;height:200px;background:var(--navy-mid);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .card-thumbnail img{width:100%;height:100%;object-fit:cover;}
  .card-thumbnail-placeholder{color:rgba(255,255,255,.25);font-size:12px;letter-spacing:.06em;}
  .card-body{padding:18px 18px 22px;}
  .card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .card-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px;background:var(--gold);color:var(--navy);letter-spacing:.05em;}
  .card-date{font-family:'Inter',sans-serif;font-size:11px;color:var(--steel);}
  .card-title{font-family:'Noto Serif JP',serif;font-size:15px;font-weight:600;line-height:1.6;color:var(--navy);margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .card-summary{font-size:12px;line-height:1.7;color:var(--steel);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .loading,.empty-message{text-align:center;padding:80px 20px;color:var(--steel);font-size:14px;grid-column:1/-1;}
  @media(max-width:768px){body{padding:60px 20px;}.column-grid{grid-template-columns:repeat(2,1fr);gap:20px;}}
  @media(max-width:480px){.column-grid{grid-template-columns:1fr;gap:20px;}}
</style>
</head>
<body>
<div class="container">
  <div class="filter-bar" id="filterBar">
    <span class="filter-pill active" data-cat="all">すべて</span>
    <span class="filter-pill" data-cat="土地活用">土地活用</span>
    <span class="filter-pill" data-cat="売買">売買</span>
    <span class="filter-pill" data-cat="事例">事例</span>
    <span class="filter-pill" data-cat="相続">相続</span>
  </div>
  <div class="column-grid" id="columnGrid">
    <div class="loading">読み込み中...</div>
  </div>
</div>
<script>
  const DATA_URL='https://cdn.jsdelivr.net/gh/mocha-design/otm-contact-tabs@main/data/column_data.json';
  const SITE_URL='https://tan669662.studio.site';
  let allItems=[],currentCat='all';
  function formatDate(d){return d?d.replace(/-/g,'.'):''}
  function renderCards(items){
    const grid=document.getElementById('columnGrid');
    if(!items.length){grid.innerHTML='<div class="empty-message">該当するコラムがありません</div>';return;}
    grid.innerHTML=items.map(item=>{
      const slug=item.slug||'';
      const thumbHtml=item.thumbnail?`<img src="${item.thumbnail}" alt="${item.title||''}" loading="lazy">`:'<span class="card-thumbnail-placeholder">記事サムネイル</span>';
      return `<div class="column-card" onclick="goToDetail('${slug}')">
        <div class="card-thumbnail">${thumbHtml}</div>
        <div class="card-body">
          <div class="card-top">
            <span class="card-badge">${item.category||''}</span>
            <span class="card-date">${formatDate(item.date||'')}</span>
          </div>
          <div class="card-title">${item.title||''}</div>
          <div class="card-summary">${item.summary||''}</div>
        </div>
      </div>`;
    }).join('');
  }
  function filterAndRender(cat){
    currentCat=cat;
    renderCards(cat==='all'?allItems:allItems.filter(it=>it.category===cat));
  }
  function goToDetail(slug){
    if(!slug) return;
    window.open(`${SITE_URL}/column-detail?slug=${encodeURIComponent(slug)}`,'_top');
  }
  document.getElementById('filterBar').addEventListener('click',function(e){
    const pill=e.target.closest('.filter-pill');
    if(!pill) return;
    document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
    pill.classList.add('active');
    filterAndRender(pill.dataset.cat);
  });
  fetch(DATA_URL).then(r=>r.json()).then(data=>{
    allItems=(data.items||[]).filter(it=>it.published!==false);
    filterAndRender('all');
  }).catch(()=>{
    document.getElementById('columnGrid').innerHTML='<div class="empty-message">データの読み込みに失敗しました</div>';
  });
</script>
</body>
</html>
