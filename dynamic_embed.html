function resolve(s){var v=P[s];return typeof v==='string'?P[v]:v;}
function getSlug(){

  var pm=ref.match(/\/property-detail\/([^/?#\s]+)/);
  var qm=ref.match(/[?&]slug=([^&#\s]+)/);
  return pm?decodeURIComponent(pm[1]):qm?decodeURIComponent(qm[1]):null;
}
