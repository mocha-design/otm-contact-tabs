lay:flex;align-items:flex-start;gap:14px;padding:16px 20px;background:#fff;border:1px solid rgba(13,27,42,0.06)}.feature-icon{flex-shrink:0;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(200,169,96,0.3);border-radius:8px;background:rgba(200,169,96,0.04)}.feature-icon svg{width:18px;height:18px;stroke:var(--gold);stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}.feature-text{font-size:13.5px;color:var(--navy);line-height:1.7;padding-top:4px}.detail-sidebar{position:-webkit-sticky;position:sticky;top:110px;align-self:start}.sidebar-inquiry{background:var(--navy);color:#fff;padding:36px 28px;margin-bottom:24px;position:relative;overflow:hidden}.sidebar-inquiry::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--gold)}.sidebar-inquiry-title{font-family:"Noto Serif JP",serif;font-size:16px;font-weight:600;text-align:center;margin-bottom:8px;letter-spacing:0.5px}.sidebar-inquiry-note{font-size:11px;color:rgba(255,255,255,0.45);text-align:center;margin-bottom:24px;line-height:1.6}.sidebar-btn{display:block;width:100%;padding:14px;font-family:"Inter",sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-align:center;transition:all 0.3s;cursor:pointer;margin-bottom:12px}.sidebar-btn.primary{background:var(--gold);color:var(--navy);border:none}.sidebar-btn.secondary{background:transparent;color:var(--gold);border:1px solid rgba(200,169,96,0.4)}.sidebar-tel{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.08)}.sidebar-tel-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(200,169,96,0.3);border-radius:50%}.sidebar-tel-icon svg{width:14px;height:14px;stroke:var(--gold);stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}.sidebar-tel-info{text-align:left}.sidebar-tel-num{font-family:"Inter",sans-serif; 'V8Jkq1Xt':{number:'TM-002',category:'住宅用地',title:'鹿沼市XX 建築条件付き',price:'1,500万円',address:'栃木県鹿沼市XX（詳細は要問い合わせ）',access:'JR鹿沼駅 車10分',area:'210m²（約63坪）',zone:'',coverage:'',road:'',facilities:'',delivery:'相談',transaction:'売主',feature1:'建築条件付きの住宅用地です。マスケングループが設計・施工まで一貫対応いたします。',feature2:'',feature3:'',map_url:'https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d25688.01!2d139.73!3d36.56!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x601f7cd5cdbfffff%3A0x4ad7ab7e3e0fddea!2z6bKc6YeO5biC!5e0!3m2!1sja!2sjp!4v1'},
'kJUd00yb':{number:'TM-003',category:'売買物件',title:'宇都宮市XX 中古戸建て',price:'3,200万円',address:'栃木県宇都宮市XX（詳細は要問い合わせ）',access:'JR宇都宮駅 バス15分',area:'詳細は要問い合わせ',zone:'',coverage:'',road:'',facilities:'',delivery:'相談',transaction:'売主',feature1:'宇都宮市内の中古戸建て物件です。詳細はお問い合わせください。',feature2:'',feature3:'',map_url:'https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d25688.01!2d139.88!3d36.55!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x601f6be1fc2be4e1%3A0x803cabbe38278b98!2z5a6H6YO95biC!5e0!3m2!1sja!2sjp!4v1'},

};

function tr(label,val){
  if(!val)return'';
  return`<tr><th>${label}</th><td>${val}</td></tr>`;
}

function featureIcon(index){
  const icons=[
    '<path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>',
    '<circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>',
    '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>'
  ];
  return icons[index]||icons[0];
}

function similarCard(slug,p){
  return`<a href="${SITE}/property-detail/${slug}" class="similar-card" target="_top">
    <div class="similar-img imgph"></div>
    <div class="similar-info">
      <div class="similar-tag eng">${p.category}</div>
      <div class="similar-title">${p.title}</div>
      <div class="similar-price eng">${p.price}</div>
    </div></a>`;
}

function render(slug,p){
  const otherSlugs=Object.keys(PROPERTIES).filter(k=>k!==slug).slice(0,3);
  const similars=otherSlugs.map(k=>similarCard(k,PROPERTIES[k])).join('');
  const features=[p.feature1,p.feature2,p.feature3].filter(Boolean);
  const featureHTML=features.map((f,i)=>`<div class="feature-item"><div class="feature-icon"><svg viewBox="0 0 24 24">${featureIcon(i)}</svg></div><div class="feature-text">${f}</div></div>`).join('');
  
  document.getElementById('main-content').innerHTML=`<section>
    <div class="detail-content">
      <div class="detail-main">
        <div class="property-header">
          <div class="property-tag-row">
            <span class="detail-tag eng">${p.category}</span>
            <span class="property-number eng">物件番号：${p.number}</span>
          </div>
          <h1 class="detail-title">${p.title}</h1>
          <div class="detail-price eng">${p.price}<span class="tax">（税込）</span></div>
        </div>
        <h3 class="detail-section-title">物件概要</h3>
        <table class="property-table">
          ${tr('所在地',p.address)}
          ${tr('交通',p.access)}
          ${tr('土地面積',p.area)}
          ${tr('用途地域',p.zone)}
          ${tr('建ぺい率 / 容積率',p.coverage)}
          ${tr('接道状況',p.road)}
          ${tr('設備',p.facilities)}
          ${tr('引渡し',p.delivery)}
          ${tr('取引態様',p.transaction)}
        </table>
        <div class="feature-points">
          <h3 class="detail-section-title">物件の特徴</h3>
          <div class="feature-list">${featureHTML}</div>
        </div>
        <div class="map-container">
          <h3 class="detail-section-title">アクセス</h3>
          <iframe src="${p.map_url}" allowfullscreen loading="lazy"></iframe>
        </div>
        <div class="back-link-wrap">
          <a href="${SITE}/property" class="back-link" target="_top">
            <svg viewBox="0 0 24 24"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg> 物件一覧に戻る
          </a>
        </div>
      </div>
      <div class="detail-sidebar">
        <div class="sidebar-inquiry">
          <div class="sidebar-inquiry-title">この物件について問い合わせる</div>
          <div class="sidebar-inquiry-note">物件番号「${p.number}」が<br>自動入力されます</div>
          <a href="${SITE}/contact?property=${p.number}" class="sidebar-btn primary eng" target="_top">お問い合わせフォーム</a>
          <a href="${SITE}/contact?property=${p.number}" class="sidebar-btn secondary eng" target="_top">来店予約・現地案内</a>
          <div class="sidebar-tel">
            <div class="sidebar-tel-icon"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div>
            <div class="sidebar-tel-info">
              <div class="sidebar-tel-num eng">028-653-0116</div>
              <div class="sidebar-tel-hours">受付 8:30〜17:30（水・日定休）</div>

        </div>
        <div class="sidebar-section">
          <div class="sidebar-section-title eng">SIMILAR PROPERTIES</div>
          ${similars}

    </div>

  document.getElementById('main-content').style.display='block';

function showError(){
  document.getElementById('loading-state').style.display='none';
  document.getElementById('error-state').style.display='block';
}

(function(){
  var params=new URLSearchParams(window.location.search);
  var slug=params.get('slug');
  if(!slug){
    // fallback: try to parse from referrer path e.g. /property-detail/IEpYUb8W
    var ref=document.referrer||'';
    var m=ref.match(/\/property-detail\/([^/?#]+)/);
    if(m)slug=m[1];
  }
  if(!slug||!PROPERTIES[slug]){
    // If no slug and not found, show first property as demo
    if(!slug){
      slug=Object.keys(PROPERTIES)[0];
      render(slug,PROPERTIES[slug]);
    } else {
      showError();
    }
    return;
  }
  render(slug,PROPERTIES[slug]);
})();
</script>
